services:
  api:
    build: .
    ports:
      - '${HTTP_PORT:-8080}:8080'
    environment:
      MONGODB_URI: ${MONGODB_URI}
      MONGODB_DATABASE: ${MONGODB_DATABASE:-restapi}
      MONGODB_COLLECTION_MOVIES: ${MONGODB_COLLECTION_MOVIES:-movies}
      UPLOAD_DIR: ${UPLOAD_DIR:-/data/covers}
      MAX_UPLOAD_MB: ${MAX_UPLOAD_MB:-10}
      HTTP_ADDR: :8080
    volumes:
      - movie_uploads:/data/covers

volumes:
  movie_uploads:
